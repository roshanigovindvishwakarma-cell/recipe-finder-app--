<!DOCTYPE html>
<html>
<head>
    <title>Recipe Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🍽 Recipe Finder</h1>
    <input type="text" id="search" placeholder="Search recipes...">
</header>

<div id="filters">
    <button onclick="filterCategory('All')">All</button>
    <button onclick="filterCategory('Breakfast')">Breakfast</button>
    <button onclick="filterCategory('Lunch')">Lunch</button>
    <button onclick="filterCategory('Dinner')">Dinner</button>
    <button onclick="filterCategory('Snacks')">Snacks</button>
</div>

<h2>Recipes</h2>
<div id="recipes"></div>

<h2>❤️ Favourites</h2>
<div id="favorites"></div>

<script src="script.js"></script>
</body>
</html>
